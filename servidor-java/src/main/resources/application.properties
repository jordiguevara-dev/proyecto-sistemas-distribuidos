# CONFIGURACIÓN PARA GOOGLE CLOUD (PC1 - DISTRIBUIDOS)

# 1. Conexión a la base de datos en la nube (instancia-bd)
spring.datasource.url=jdbc:mysql://104.154.47.132:3306/neptuno?serverTimezone=UTC

# 2. Credenciales del usuario creado en MariaDB/MySQL
spring.datasource.username=alumno
spring.datasource.password=utp123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Configuración de JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

# Esta línea asegura que Hibernate respete las Mayúsculas de las tablas de Neptuno
# He verificado que no tenga espacios al final para evitar el ClassNotFoundException
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 4. Puerto de salida del Middleware (Debe estar abierto en el Firewall de GCP)
server.port=8080